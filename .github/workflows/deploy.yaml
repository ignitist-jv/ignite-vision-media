name: Deploy to ignitevisionmedia.com

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP deploy to web root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}      # e.g. ftp.ignitevisionmedia.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}   # ftp | ftps | sftp
          port:     ${{ vars.FTP_PORT || '21' }}
          # Repo root maps onto the site web root, so repo/homepage -> webroot/homepage
          local-dir:  ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}       # e.g. /public_html/  (MUST end with a slash)
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
